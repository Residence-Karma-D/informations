name: Toggle Key

on:
  workflow_dispatch:
    inputs:
      key:
        description: 'Key ID (D103, D106, D110)'
        required: true
        type: choice
        options:
          - D103
          - D106
          - D110
      active:
        description: 'Set active state'
        required: true
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  toggle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toggle key in data file
        run: |
          FILE="src/data/keys.json"
          KEY="${{ github.event.inputs.key }}"
          ACTIVE="${{ github.event.inputs.active }}"

          # Validate inputs
          if [[ ! "$KEY" =~ ^D1(03|06|10)$ ]]; then
            echo "::error::Invalid key: $KEY"
            exit 1
          fi

          # Update the JSON with jq
          jq --arg key "$KEY" --argjson active "$ACTIVE" \
            '.[$key].active = $active' "$FILE" > tmp.json && mv tmp.json "$FILE"

          echo "Updated $KEY → active=$ACTIVE"
          cat "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/keys.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Toggle ${{ github.event.inputs.key }} → active=${{ github.event.inputs.active }}"
          git push
